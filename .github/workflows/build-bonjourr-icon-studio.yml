name: Build Bonjourr Icon Studio
# Build revision 6

on:
  push:
    branches:
      - app-build
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: app/BonjourrIconStudio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore app icon
        shell: pwsh
        run: "[IO.File]::WriteAllBytes('Assets/App.ico', [Convert]::FromBase64String((Get-Content 'Assets/App.ico.base64' -Raw)))"

      - name: Restore
        run: dotnet restore BonjourrIconStudio.csproj

      - name: Publish portable x64 app
        run: dotnet publish BonjourrIconStudio.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ../../Bonjourr-Icon-Studio-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bonjourr-Icon-Studio-win-x64
          path: Bonjourr-Icon-Studio-win-x64.zip
          if-no-files-found: error
          retention-days: 14
